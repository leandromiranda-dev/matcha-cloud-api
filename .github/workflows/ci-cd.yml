name: Matcha API CI/CD Pipeline

# El robot se despertará cada vez que haya un push a la rama main
on:
  push:
    branches: [ "main" ]

jobs:
  integracion-y-despliegue:
    runs-on: ubuntu-latest # Usamos el estándar de la industria, súper rápido y sin errores de Windows
    
    steps:
    - name: 1. Descargar el código
      uses: actions/checkout@v4
      
    - name: 2. Configurar Python 3.10 (Entorno Limpio)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: 3. Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        
    - name: 4. Ejecutar Pruebas Unitarias (Validación Estricta)
      run: pytest test_main.py
      
    - name: 5. Iniciar Sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: leandro20006
        # Usamos un secreto oculto para NUNCA exponer tu contraseña en el código
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: 6. Construir y Subir Imagen Optimizada
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: leandro20006/matcha-api:v3